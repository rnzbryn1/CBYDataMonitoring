<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <title>Account Manager - Data Monitoring System</title>
    <link rel="stylesheet" href="accountmanager.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Account Manager</h1>
        <button id="toggleCreateForm" class="btn btn-primary">+ Create New User</button>
    </div>

    <!-- Create User Form (Hidden by default) -->
    <div class="card" id="createUserCard" style="display: none;">
        <h2>Create New User</h2>
        <form id="createUserForm" autocomplete="off">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" required minlength="6" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="department">Department *</label>
                <select id="department" required autocomplete="off">
                    <option value="">Select Department</option>
                </select>
            </div>

            <div class="form-group">
                <label for="role">Role *</label>
                <select id="role" required autocomplete="off">
                    <option value="">Select Role</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create User</button>
                <button type="button" class="btn btn-secondary" id="cancelCreate">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Users List -->
    <div class="table-section">
        <h2>Existing Users</h2>
        <div id="usersList">
            <p>Loading users...</p>
        </div>
    </div>
</div>

<!-- RESET PASSWORD MODAL -->
<div id="resetPasswordModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-btn" onclick="closeResetPasswordModal()">&times;</span>
        <h3>Reset User Password</h3>
        <p id="resetPasswordUserEmail" style="margin-bottom: 15px; color: #666;"></p>
        <div id="resetPasswordMessage"></div>
        <form id="resetPasswordForm" autocomplete="off">
            <input type="text" name="username" style="display: none;" autocomplete="username">
            <div class="form-group">
                <label for="newPassword">New Password *</label>
                <input type="password" id="newPassword" name="new-password" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" name="confirm-password" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Reset Password</button>
                <button type="button" class="btn btn-secondary" onclick="closeResetPasswordModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>
</div>

<script type="module" src="accountmanager.js"></script>
</body>
</html>
