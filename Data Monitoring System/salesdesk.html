<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Sales System</title>
    <link rel="stylesheet" href="salesdesk.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h1>Department Management System</h1>

    <div class="admin-grid">
        <div class="admin-card">
            <h3>1. Create New Category</h3>
            <input type="text" id="newCategoryName" placeholder="e.g., Rejected Items">
            <button onclick="createNewCategory()">Create Category</button>
        </div>

        <div class="admin-card">
            <h3>2. Add Column to <span id="activeCategoryName">...</span></h3>
            <div class="row">
                <input type="text" id="newColumnName" placeholder="Column Name">
                <select id="newColumnType">
                    <option value="text">Text</option>
                    <option value="number">Number</option>
                    <option value="date">Date</option>
                </select>
                <button onclick="addColumnToActive()">Add Column</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="main-controls">
        <div class="selector">
            <label>Current Category:</label>
            <select id="categoryDropdown" onchange="switchCategory(this.value)"></select>
        </div>
        <input type="text" id="search" placeholder="Search records..." oninput="searchData()">
    </div>

    <div class="form-section">
        <h3>Entry Form</h3>
        <div id="dynamicForm" class="grid-form">
            </div>
    </div>

    <div class="table-section">
        <table id="mainTable">
            <thead id="tableHeaders"></thead>
            <tbody id="tableData"></tbody>
        </table>
    </div>
</div>

<script type="module" src="salesdesk.js"></script>
</body>
</html>
